name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build, test, and package
        run: .\gradlew.bat clean test packageRelease --console=plain --no-daemon

      - name: Upload bundled showcase jar
        uses: actions/upload-artifact@v7
        with:
          name: html-dom-ui-bundled
          path: modules/html-dom-desktop/build/libs/html-dom-ui-*-bundled.jar
