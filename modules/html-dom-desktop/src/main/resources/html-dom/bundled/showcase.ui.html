<html id="fl-root" data-mode="boot" data-screen="main-menu">
    <head>
        <meta charset="utf-8">
        <title>
            FrozenLands
        </title>
    </head>
    <body>
        <div class="ui-root" id="ui-root">
            <div id="screen-main-menu" style="display: block;" class="screen main-menu" data-visible="true">
                <div class="menu-card">
                    <p class="kicker">
                        TAKE SOME / FROZENLANDS
                    </p>
                    <p class="title">
                        FrozenLands
                    </p>
                    <p class="subtitle">
                        Northern expedition control shell.
                    </p>
                    <div class="menu-separator">
                    </div>
                    <p class="status" id="main-menu-status">
                        No saves. Start expedition.
                    </p>
                    <button data-action="game.new" id="btn-new-game" class="menu-button primary">
                        New Expedition
                    </button>
                    <button data-action="game.continue" id="btn-continue" class="menu-button" disabled="disabled" data-slot="">
                        Continue
                    </button>
                    <button data-action="game.refreshSaves" id="btn-refresh-saves" class="menu-button">
                        Refresh Saves
                    </button>
                    <button data-action="game.exitToDesktop" id="btn-exit" class="menu-button danger">
                        Exit
                    </button>
                    <div class="save-box">
                        <p class="save-title" style="margin-left: 10;">
                            Saves
                        </p>
                        <p class="save-count" id="save-count" style="display: none;">
                        </p>
                        <div class="save-list" id="save-list">
                            <p class="save-empty">
                                No saved expeditions yet.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
            <div id="screen-hud" style="display: none;" class="screen hud" data-visible="false">
                <div class="hud-panel">
                    <p class="kicker">
                        FROZENLANDS
                    </p>
                    <p class="hud-text">
                        HUD active. Press F10 or ESC for pause.
                    </p>
                </div>
            </div>
            <div id="screen-pause" style="display: none;" class="screen pause" data-visible="false">
                <div class="menu-card pause-card">
                    <p class="kicker">
                        SYSTEM
                    </p>
                    <p class="title">
                        Paused
                    </p>
                    <p class="status" id="pause-load-status">
                        No saves. Start expedition.
                    </p>
                    <button data-action="game.resume" id="btn-resume" class="menu-button primary">
                        Resume
                    </button>
                    <button data-action="game.save" id="btn-save" class="menu-button">
                        Save
                    </button>
                    <button data-action="ui.mainMenu" id="btn-main-menu" class="menu-button">
                        Main Menu
                    </button>
                    <button data-action="game.exitToDesktop" id="btn-pause-exit" class="menu-button danger">
                        Exit
                    </button>
                    <div class="save-list" id="pause-save-list">
                        <p class="save-empty">
                            No saved expeditions yet.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
